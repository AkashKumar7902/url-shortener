name: Keploy API Tests

# Replays the committed Keploy test cases (keploy/) against the service. The
# recorded mocks.yaml stands in for PostgreSQL, so CI needs no database — it
# only runs `keploy test`. Re-record locally with scripts/keploy_record.sh when
# the API contract changes.
#
# Uses the open-source Keploy binary (`--oss`); no API key required. eBPF-based,
# so Linux-only. Kept separate from the required CI pipeline.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  keploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      # Must match the DSN used when recording, so the app's connection matches
      # the recorded DNS + Postgres mocks. No real database is started.
      STORE_BACKEND: "postgres"
      DATABASE_URL: "postgres://postgres@keploy_rec_pg:5432/postgres?sslmode=disable&pool_max_conns=1&default_query_exec_mode=simple_protocol"
      PUBLIC_BASE_URL: "http://localhost:8080"
      HTTP_ADDR: ":8080"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Build binary
        run: go build -o urlshortener ./cmd/urlshortener

      - name: Install Keploy (open source)
        run: |
          curl --silent -L https://keploy.io/install.sh | bash -s -- --oss
          keploy --version || true

      - name: Replay recorded test cases (mocked DB)
        run: |
          set -x
          if [ -z "$(find keploy -name '*.yaml' -path '*/tests/*' -print -quit 2>/dev/null)" ]; then
            echo "::error::No committed Keploy test cases found under keploy/. Record with scripts/keploy_record.sh"
            exit 1
          fi
          sudo -E env PATH="$PATH" STORE_BACKEND="$STORE_BACKEND" DATABASE_URL="$DATABASE_URL" PUBLIC_BASE_URL="$PUBLIC_BASE_URL" HTTP_ADDR="$HTTP_ADDR" \
            keploy test -c "./urlshortener" --delay 10 2>&1 | tee test.log

          reports="$(find keploy/reports -name '*-report.yaml' 2>/dev/null)"
          if [ -z "$reports" ]; then
            echo "::error::No Keploy test reports were produced — replay did not run"
            exit 1
          fi
          fail=0
          for report in $reports; do
            status="$(grep -m1 'status:' "$report" | awk '{print $2}')"
            echo "$report -> $status"
            [ "$status" = "PASSED" ] || fail=1
          done
          if [ "$fail" -ne 0 ]; then
            echo "::error::One or more Keploy test sets failed"
            exit 1
          fi
          echo "All Keploy test sets passed"

      - name: Upload Keploy reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: keploy-reports
          path: |
            keploy/reports/
            test.log
          if-no-files-found: ignore

name: Keploy Record (manual)

# Manually-triggered helper to (re)record Keploy test cases + mocks against a
# real PostgreSQL, then upload them as an artifact. Download the artifact and
# commit the `keploy/` directory; CI (keploy.yml) then replays it with no
# database. Re-run this whenever the API contract changes.
#
# Uses the open-source Keploy binary (`--oss`), so no API key is needed.
# pool_max_conns=1 + simple protocol keep the recorded SQL deterministic.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  record:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: "postgres://postgres@localhost:5432/postgres?sslmode=disable&pool_max_conns=1&default_query_exec_mode=simple_protocol"
      PUBLIC_BASE_URL: "http://localhost:8080"
      HTTP_ADDR: ":8080"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Build binary
        run: go build -o urlshortener ./cmd/urlshortener

      - name: Install Keploy (open source)
        run: |
          curl --silent -L https://keploy.io/install.sh | bash -s -- --oss
          keploy --version || true

      - name: Record test cases + mocks
        run: |
          set -x
          rm -rf keploy/
          keploy config --generate || true
          if [ -f keploy.yml ]; then
            sed -i 's/global: {}/global: {"header":{"Date":[]}}/' keploy.yml || true
          fi

          send_traffic() {
            for _ in $(seq 1 40); do
              if (echo > /dev/tcp/localhost/8080) 2>/dev/null; then break; fi
              sleep 1
            done
            sleep 2
            curl -s -X POST -H 'Content-Type: application/json' \
              -d '{"url":"https://example.com/one"}' http://localhost:8080/shorten
            curl -s -X POST -H 'Content-Type: application/json' \
              -d '{"url":"https://example.com/one"}' http://localhost:8080/shorten
            curl -s -X POST -H 'Content-Type: application/json' \
              -d '{"url":"https://example.com/two","custom_alias":"docs"}' http://localhost:8080/shorten
            curl -s -o /dev/null http://localhost:8080/docs
            curl -s -o /dev/null http://localhost:8080/missing
            curl -s -o /dev/null -X POST -H 'Content-Type: application/json' \
              -d '{"url":"ftp://nope"}' http://localhost:8080/shorten
            sleep 5
            sudo kill -INT "$(pgrep -n -f 'keploy record')" 2>/dev/null || true
          }

          send_traffic &
          sudo -E env PATH="$PATH" DATABASE_URL="$DATABASE_URL" PUBLIC_BASE_URL="$PUBLIC_BASE_URL" HTTP_ADDR="$HTTP_ADDR" \
            keploy record -c "./urlshortener" 2>&1 | tee record.log
          echo "=== recorded tree ==="; ls -R keploy/ || true
          if [ -z "$(find keploy -name '*.yaml' -print -quit 2>/dev/null)" ]; then
            echo "::error::no test cases recorded"; exit 1
          fi

      - name: Self-check replay (uses mocks; no real DB traffic)
        run: |
          set -x
          sudo -E env PATH="$PATH" DATABASE_URL="$DATABASE_URL" PUBLIC_BASE_URL="$PUBLIC_BASE_URL" HTTP_ADDR="$HTTP_ADDR" \
            keploy test -c "./urlshortener" --delay 10 2>&1 | tee test.log
          reports="$(find keploy/reports -name '*-report.yaml' 2>/dev/null)"
          [ -n "$reports" ] || { echo "::error::no reports"; exit 1; }
          fail=0
          for r in $reports; do
            s="$(grep -m1 'status:' "$r" | awk '{print $2}')"; echo "$r -> $s"
            [ "$s" = "PASSED" ] || fail=1
          done
          [ "$fail" -eq 0 ] || { echo "::error::replay failed"; exit 1; }

      - name: Upload recorded keploy directory
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: keploy-recorded
          path: |
            keploy/
            keploy.yml
            record.log
            test.log
          if-no-files-found: ignore

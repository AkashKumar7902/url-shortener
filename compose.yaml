services:
  url-shortener:
    build: .
    environment:
      HTTP_ADDR: ":8080"
      PUBLIC_BASE_URL: "http://localhost:8080"
      DATA_FILE: "/data/links.json"
    ports:
      - "8080:8080"
    volumes:
      - url-shortener-data:/data
    restart: unless-stopped

volumes:
  url-shortener-data:

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: shortener
      POSTGRES_PASSWORD: shortener
      POSTGRES_DB: shortener
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shortener"]
      interval: 2s
      timeout: 3s
      retries: 15
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      HTTP_ADDR: ":8080"
      PUBLIC_BASE_URL: "http://localhost:8080"
      STORE_BACKEND: "postgres"
      DATABASE_URL: "postgres://shortener:shortener@db:5432/shortener?sslmode=disable"
    ports:
      - "8080:8080"

volumes:
  pgdata:
